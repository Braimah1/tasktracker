# ===========================================
# PRODUCTION PROFILE
# Activate with: SPRING_PROFILES_ACTIVE=prod
# All secrets MUST come from environment variables.
# Never put real credentials in this file.
# ===========================================

# Don't auto-alter schema in prod; run schema.sql once via migration instead
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}

# Cache compiled Thymeleaf templates in prod for performance
spring.thymeleaf.cache=true

# Reduce log verbosity in prod
logging.level.root=WARN
logging.level.com.tasktracker=INFO

# Force HTTPS-only cookies in prod (Render terminates TLS at the edge,
# so this is safe and recommended)
server.servlet.session.cookie.secure=true


management.health.mail.enabled=false
