# ===========================================
# DEFAULT / LOCAL DEVELOPMENT CONFIGURATION
# Production values come from environment
# variables via application-prod.properties
# ===========================================

spring.application.name=tasktracker

# Server
server.port=${PORT:8080}
server.forward-headers-strategy=framework

# Database - reads from env vars, falls back to local dev defaults
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/tasktracker?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool (HikariCP) - sane defaults for small free-tier DBs
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.cache=${THYMELEAF_CACHE:false}
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Session
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# Logging
logging.level.com.tasktracker=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

# App properties
app.password-reset.token-expiry-hours=24
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Email (optional - if MAIL_USERNAME is blank, app logs reset links instead of emailing)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:noreply@tasktracker.app}

# Actuator (basic health check for hosting platforms)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
