<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Edit Task')}"></head>
<body>
<div class="app-layout">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div th:replace="~{fragments/layout :: sidebar('tasks')}"></div>

  <div class="main-content">
    <div class="topbar">
      <div class="d-flex align-center gap-12">
        <button class="mobile-toggle" id="mobileToggle">☰</button>
        <span class="page-title">Edit Task</span>
      </div>
      <div class="topbar-actions">
        <a th:href="@{/tasks}" class="btn btn-secondary btn-sm">← Back to Tasks</a>
      </div>
    </div>

    <div class="page-body">
      <div th:if="${error}" class="alert alert-error">⚠ <span th:text="${error}"></span></div>

      <div class="card" style="max-width:640px;">
        <div class="card-header">
          <h3 class="card-title" th:text="${task.title}">Edit Task</h3>
          <span th:with="sc=${task.status.name() == 'IN_PROGRESS' ? 'inprogress' : task.status.name().toLowerCase()}"
                th:class="'badge badge-' + ${sc}"
                th:text="${task.status.name().replace('_', ' ')}">STATUS</span>
        </div>
        <div class="card-body">
          <form th:action="@{/tasks/edit/{id}(id=${task.id})}" method="post" th:object="${taskRequest}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="form-group">
              <label class="form-label" for="title">Task Title *</label>
              <input class="form-control" type="text" id="title" th:field="*{title}"
                     placeholder="What needs to be done?" required maxlength="255">
              <div class="form-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
            </div>

            <div class="form-group">
              <label class="form-label" for="description">Description</label>
              <textarea class="form-control" id="description" th:field="*{description}"
                        placeholder="Add details..."></textarea>
            </div>

            <div class="form-row">
              <div class="form-group mb-0">
                <label class="form-label" for="priority">Priority *</label>
                <select class="form-control" id="priority" th:field="*{priority}" required>
                  <option value="">Select priority</option>
                  <option th:each="p : ${priorities}" th:value="${p.name()}" th:text="${p.name()}">MEDIUM</option>
                </select>
                <div class="form-error" th:if="${#fields.hasErrors('priority')}" th:errors="*{priority}"></div>
              </div>

              <div class="form-group mb-0">
                <label class="form-label" for="categoryId">Category</label>
                <select class="form-control" id="categoryId" th:field="*{categoryId}">
                  <option value="">No category</option>
                  <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}">Category</option>
                </select>
              </div>
            </div>

            <div class="form-row" style="margin-top:18px;">
              <div class="form-group mb-0">
                <label class="form-label" for="dueDate">Due Date</label>
                <input class="form-control" type="date" id="dueDate" th:field="*{dueDate}">
              </div>
              <div class="form-group mb-0">
                <label class="form-label" for="dueTime">Due Time</label>
                <input class="form-control" type="time" id="dueTime" th:field="*{dueTime}">
              </div>
            </div>

            <div class="d-flex gap-12" style="margin-top:24px;">
              <button type="submit" class="btn btn-primary">Save Changes</button>
              <a th:href="@{/tasks}" class="btn btn-secondary">Cancel</a>
            </div>
          </form>
        </div>
      </div>

      <!-- Task metadata -->
      <div style="margin-top:16px;padding:12px 16px;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;max-width:640px;font-size:.8rem;color:#64748B;">
        <span>Created: <strong th:text="${#temporals.format(task.createdAt, 'MMMM d, yyyy')}">Jan 1</strong></span>
        <span th:if="${task.completedAt != null}" style="margin-left:16px;">
          Completed: <strong th:text="${#temporals.format(task.completedAt, 'MMMM d, yyyy')}">Jan 1</strong>
        </span>
      </div>
    </div>
  </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
