<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Create Account')}"></head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="brand-icon">✓</div>
      <span class="brand-name" style="font-size:1.2rem;color:#0F172A;">TaskTracker</span>
    </div>

    <h1 class="auth-title">Create your account</h1>
    <p class="auth-subtitle">Start tracking tasks in seconds</p>

    <div th:if="${error}" class="alert alert-error">
      <span>⚠</span>
      <span th:text="${error}">Error</span>
    </div>

    <form th:action="@{/auth/register}" method="post" th:object="${registerRequest}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

      <div class="form-row">
        <div class="form-group mb-0">
          <label class="form-label" for="firstName">First name</label>
          <input class="form-control" type="text" id="firstName" th:field="*{firstName}"
                 placeholder="Jane" required autocomplete="given-name">
          <div class="form-error" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
        </div>
        <div class="form-group mb-0">
          <label class="form-label" for="lastName">Last name</label>
          <input class="form-control" type="text" id="lastName" th:field="*{lastName}"
                 placeholder="Smith" required autocomplete="family-name">
          <div class="form-error" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
        </div>
      </div>

      <div class="form-group" style="margin-top:18px;">
        <label class="form-label" for="email">Email address</label>
        <input class="form-control" type="email" id="email" th:field="*{email}"
               placeholder="you@example.com" required autocomplete="email">
        <div class="form-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-control" type="password" id="password" th:field="*{password}"
               placeholder="Min. 8 characters" required autocomplete="new-password">
        <div id="strengthIndicator" style="display:flex;gap:4px;margin-top:6px;">
          <div class="strength-bar" style="height:4px;flex:1;background:#E2E8F0;border-radius:99px;transition:background .2s;"></div>
          <div class="strength-bar" style="height:4px;flex:1;background:#E2E8F0;border-radius:99px;transition:background .2s;"></div>
          <div class="strength-bar" style="height:4px;flex:1;background:#E2E8F0;border-radius:99px;transition:background .2s;"></div>
          <div class="strength-bar" style="height:4px;flex:1;background:#E2E8F0;border-radius:99px;transition:background .2s;"></div>
        </div>
        <div class="form-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm password</label>
        <input class="form-control" type="password" id="confirmPassword" th:field="*{confirmPassword}"
               placeholder="••••••••" required autocomplete="new-password">
        <div id="confirmHint" class="form-hint"></div>
        <div class="form-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
      </div>

      <button type="submit" class="btn btn-primary w-full" style="justify-content:center;padding:12px;">
        Create Account
      </button>
    </form>

    <div style="text-align:center;margin-top:16px;font-size:.875rem;color:#64748B;">
      Already have an account?
      <a th:href="@{/auth/login}" class="auth-link">Sign in</a>
    </div>
  </div>
</div>

<style>
  .strength-bar.weak   { background: #EF4444 !important; }
  .strength-bar.fair   { background: #F59E0B !important; }
  .strength-bar.good   { background: #3B82F6 !important; }
  .strength-bar.strong { background: #10B981 !important; }
</style>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
