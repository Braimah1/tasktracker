<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Set New Password')}"></head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="brand-icon">✓</div>
      <span class="brand-name" style="font-size:1.2rem;color:#0F172A;">TaskTracker</span>
    </div>

    <h1 class="auth-title">Set new password</h1>
    <p class="auth-subtitle">Choose a strong password for your account</p>

    <div th:if="${error}" class="alert alert-error">
      <span>⚠</span>
      <span th:text="${error}">Error</span>
    </div>

    <form th:action="@{/auth/reset-password}" method="post" th:object="${resetRequest}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <input type="hidden" id="token" th:field="*{token}" th:value="${token}">

      <div class="form-group">
        <label class="form-label" for="password">New password</label>
        <input class="form-control" type="password" id="password" th:field="*{password}"
               placeholder="Min. 8 characters" required autocomplete="new-password">
        <div class="form-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm new password</label>
        <input class="form-control" type="password" id="confirmPassword" th:field="*{confirmPassword}"
               placeholder="••••••••" required autocomplete="new-password">
        <div id="confirmHint" class="form-hint"></div>
        <div class="form-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
      </div>

      <button type="submit" class="btn btn-primary w-full" style="justify-content:center;padding:12px;">
        Reset Password
      </button>
    </form>
  </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
