<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Reset Password')}"></head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="brand-icon">✓</div>
      <span class="brand-name" style="font-size:1.2rem;color:#0F172A;">TaskTracker</span>
    </div>

    <h1 class="auth-title">Forgot password?</h1>
    <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>

    <div th:if="${message}" class="alert alert-success">
      <span>✓</span>
      <span th:text="${message}">Message</span>
    </div>
    <div th:if="${error}" class="alert alert-error">
      <span>⚠</span>
      <span th:text="${error}">Error</span>
    </div>

    <form th:action="@{/auth/forgot-password}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input class="form-control" type="email" id="email" name="email"
               placeholder="you@example.com" required autocomplete="email">
      </div>

      <button type="submit" class="btn btn-primary w-full" style="justify-content:center;padding:12px;">
        Send Reset Link
      </button>
    </form>

    <div style="text-align:center;margin-top:20px;">
      <a th:href="@{/auth/login}" class="auth-link" style="font-size:.875rem;">← Back to sign in</a>
    </div>
  </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
