<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head th:replace="~{fragments/layout :: head('Sign In')}">
</head>

<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="brand-icon">✓</div>
        <span class="brand-name" style="font-size:1.2rem;color:#0F172A;">TaskTracker</span>
      </div>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to continue managing your tasks</p>

      <div th:if="${error}" class="alert alert-error" data-auto-dismiss>
        <span>⚠</span>
        <span th:text="${error}">Error</span>
      </div>
      <div th:if="${message}" class="alert alert-success" data-auto-dismiss>
        <span>✓</span>
        <span th:text="${message}">Message</span>
      </div>

      <form th:action="@{/auth/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input class="form-control" type="email" id="email" name="email" placeholder="you@example.com" required
            autocomplete="email">
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-control" type="password" id="password" name="password" placeholder="••••••••" required
            autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary w-full" style="justify-content:center;padding:12px;">
          Sign In
        </button>
      </form>

      <div class="auth-divider">
        <a th:href="@{/auth/forgot-password}" class="auth-link">Forgot your password?</a>
      </div>

      <div style="text-align:center;margin-top:16px;font-size:.875rem;color:#64748B;">
        Don't have an account?
        <a th:href="@{/auth/register}" class="auth-link">Create one</a>
      </div>
    </div>
  </div>
  <div th:replace="~{fragments/layout :: scripts}"></div>
</body>

</html>
