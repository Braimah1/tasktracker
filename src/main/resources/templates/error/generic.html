<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head th:replace="~{fragments/layout :: head('Something went wrong')}">
</head>

<body>
  <div class="auth-page">
    <div class="auth-card" style="text-align:center;">
      <div class="auth-logo">
        <div class="brand-icon">✓</div>
        <span class="brand-name" style="font-size:1.2rem;color:#0F172A;">TaskTracker</span>
      </div>

      <div style="font-size:3rem;line-height:1;margin-bottom:8px;" th:text="${statusCode == 404} ? '🔍' : '⚠️'">⚠️</div>

      <h1 class="auth-title" th:text="${statusCode == 404} ? 'Page not found' : 'Something went wrong'">Error</h1>
      <p class="auth-subtitle" th:text="${errorMessage} ?: 'An unexpected error occurred. Please try again.'">
        An unexpected error occurred.
      </p>

      <a th:href="@{/dashboard}" class="btn btn-primary w-full" style="justify-content:center;padding:12px;text-decoration:none;display:flex;">
        Back to Dashboard
      </a>

      <div style="text-align:center;margin-top:16px;">
        <a th:href="@{/auth/login}" class="auth-link" style="font-size:.875rem;">Or sign in again</a>
      </div>
    </div>
  </div>
  <div th:replace="~{fragments/layout :: scripts}"></div>
</body>

</html>
